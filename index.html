<title>Daily Mind</title>
<!-- version: 2.5.5 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #EDE5D8;
  --surface:   #E4D9C9;
  --surface-2: #D8CABB;
  --text:      #261B10;
  --muted:     #6A5342;
  --faint:     #9E8570;
  --border:    rgba(38,27,16,0.1);
  --accent:    #B55830;
  --accent-2:  rgba(181,88,48,0.18);
  --accent-3:  rgba(181,88,48,0.08);
  --success:   #4E7A5A;
  --radius:    20px;
  --ease:      cubic-bezier(0.4,0,0.2,1);
}

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── AMBIENT GLOW ── */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 55%, rgba(181,88,48,0.07), transparent);
  transition: opacity 1.5s var(--ease);
  opacity: 1;
  animation: ambientShift 24s ease-in-out infinite alternate;
}
.ambient.active { opacity: 2.2; }

.app-opening {
  position: fixed;
  inset: 0;
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  transition: opacity .72s var(--ease), transform .72s var(--ease);
}
.app-opening.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.018);
}
.opening-mark {
  width: 124px;
  height: 124px;
  border-radius: 50%;
  background: var(--surface);
  box-shadow: 0 3px 28px rgba(38,27,16,0.13), 0 1px 4px rgba(38,27,16,0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  position: relative;
  animation: openingPulse 1.65s var(--ease) both;
}
.opening-mark::before,
.opening-mark::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(181,88,48,0.22);
  opacity: 0;
  animation: openingRing 1.65s ease-out both;
}
.opening-mark::after {
  animation-delay: .22s;
}
.opening-mark svg {
  width: 36px;
  height: 36px;
  display: block;
}
@keyframes openingPulse {
  0%   { opacity: 0; transform: scale(.82); box-shadow: 0 0 0 rgba(38,27,16,0); }
  28%  { opacity: 1; transform: scale(1); }
  56%  { opacity: 1; transform: scale(1.055); box-shadow: 0 9px 38px rgba(38,27,16,0.16), 0 1px 4px rgba(38,27,16,0.07); }
  82%  { opacity: 1; transform: scale(.985); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes openingRing {
  0%, 22% { transform: scale(.92); opacity: 0; }
  45% { opacity: .34; }
  100% { transform: scale(1.42); opacity: 0; }
}
@keyframes ambientShift {
  0% { transform: translate3d(-1%, -.5%, 0) scale(1); }
  100% { transform: translate3d(1%, .8%, 0) scale(1.03); }
}
@media (prefers-reduced-motion: reduce) {
  .ambient, .opening-mark, .opening-wordmark { animation: none; }
}


/* ── SCREEN SYSTEM ── */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
  z-index: 1;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}
.screen.slide-up { transform: translateY(24px); }
.screen.active.slide-up { transform: translateY(0); }
.screen.slide-down { transform: translateY(-20px); }
.screen.active.slide-down { transform: translateY(0); }

/* ══════════════════════════════════════
   SCREEN 1 – IDLE
══════════════════════════════════════ */
#screen-idle {
  justify-content: space-between;
  padding: 0 28px;
}

.header {
  width: 100%; text-align: center;
  padding-top: 52px;
}

.app-mark {
  width: 42px;
  height: 42px;
  margin: 0 auto 14px;
  border-radius: 14px;
  background:
    radial-gradient(circle at 64% 32%, rgba(237,229,216,0.96) 0 4px, transparent 5px),
    radial-gradient(circle at 50% 50%, rgba(237,229,216,0.14), transparent 58%),
    linear-gradient(135deg, #261B10, #B55830);
  box-shadow: 0 10px 28px rgba(38,27,16,0.18);
  position: relative;
  overflow: hidden;
}
.app-mark::before {
  content: "";
  position: absolute;
  left: 10px; top: 12px;
  width: 22px; height: 18px;
  border: 3px solid rgba(237,229,216,0.9);
  border-left-color: transparent;
  border-bottom-color: transparent;
  border-radius: 50%;
  transform: rotate(-18deg);
}
.app-mark::after {
  content: "";
  position: absolute;
  left: 17px; top: 18px;
  width: 12px; height: 10px;
  border: 3px solid rgba(237,229,216,0.9);
  border-right-color: transparent;
  border-top-color: transparent;
  border-radius: 50%;
  transform: rotate(-18deg);
}


.logo {
  font-family: 'Playfair Display', serif;
  font-size: 34px; font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}

.logo-sub {
  margin-top: 5px;
  font-size: 12px; font-weight: 400;
  color: var(--faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.header-rule {
  width: 28px; height: 1px;
  background: var(--faint); opacity: 0.4;
  margin: 18px auto 0;
}

/* Center content */
.idle-center {
  display: flex; flex-direction: column;
  align-items: center; gap: 36px;
  width: 100%;
}

.date-chip {
  font-size: 12px; font-weight: 400;
  color: var(--faint);
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.prompt {
  text-align: center;
  padding: 0 12px;
}

.prompt-text {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 400;
  line-height: 1.38; color: var(--text);
  transition: opacity 0.4s var(--ease);
}
.prompt-text.fade { opacity: 0; }

/* Button area */
.btn-area {
  display: flex; flex-direction: column;
  align-items: center; gap: 18px;
}

.ring-wrap {
  position: relative; width: 192px; height: 192px;
  display: flex; align-items: center; justify-content: center;
}

.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid var(--accent); opacity: 0;
}
.r1 { width: 162px; height: 162px; }
.r2 { width: 192px; height: 192px; }
.r3 { width: 222px; height: 222px; }

@keyframes ripple {
  0%   { transform: scale(.88); opacity: .5; }
  100% { transform: scale(1.06); opacity: 0; }
}
@keyframes breathe {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.025); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.recording .r1 { animation: ripple 2.4s ease-out infinite; }
.recording .r2 { animation: ripple 2.4s ease-out .65s infinite; }
.recording .r3 { animation: ripple 2.4s ease-out 1.3s infinite; }

.mic-btn {
  width: 124px; height: 124px;
  border-radius: 50%; border: none;
  background: var(--surface);
  box-shadow: 0 3px 28px rgba(38,27,16,0.13), 0 1px 4px rgba(38,27,16,0.07);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 2; position: relative;
  animation: breathe 4.5s ease-in-out infinite;
  transition: background 0.4s var(--ease), box-shadow 0.4s var(--ease);
  -webkit-user-select: none; user-select: none;
}
.mic-btn:active { transform: scale(0.93) !important; transition: transform 0.1s; }
.mic-btn.rec {
  background: var(--accent);
  box-shadow: 0 4px 32px rgba(181,88,48,0.3);
  animation: none;
}

.ic { display: flex; align-items: center; justify-content: center; }
.ic-stop { display: none; }
.mic-btn.rec .ic-mic { display: none; }
.mic-btn.rec .ic-stop { display: flex; }

.timer {
  font-size: 13px; font-weight: 500; letter-spacing: 0.12em;
  color: var(--accent); font-variant-numeric: tabular-nums;
  height: 18px; opacity: 0;
  transition: opacity 0.35s var(--ease);
}
.timer.visible { opacity: 1; }

/* Live transcript pill */
.live-pill {
  background: var(--surface);
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 13px; line-height: 1.55;
  color: var(--muted);
  text-align: center;
  min-height: 42px;
  width: 100%;
  opacity: 0;
  transition: opacity 0.35s var(--ease);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.live-pill.visible { opacity: 1; }

/* Footer */
.idle-footer {
  width: 100%; text-align: center;
  padding-bottom: 44px;
}
.hint {
  font-size: 13px; color: var(--muted);
  margin-bottom: 16px;
  transition: opacity 0.35s;
}
.memo-strip {
  display: flex; align-items: center;
  justify-content: center; gap: 10px;
  font-size: 11px; color: var(--faint);
  letter-spacing: 0.06em;
}
.memo-pips { display: flex; gap: 5px; }
.pip {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid rgba(38,27,16,0.12);
  transition: background 0.3s, border-color 0.3s;
}
.pip.on { background: var(--accent); border-color: var(--accent); }

/* ══════════════════════════════════════
   SCREEN 2 – REVIEW
══════════════════════════════════════ */
#screen-review {
  justify-content: flex-start;
  padding: 0 28px;
}

.review-header {
  width: 100%; text-align: center;
  padding-top: 54px; padding-bottom: 6px;
}

.review-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 400;
  color: var(--text);
}

.review-subtitle {
  margin-top: 6px;

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────────
const MAKE_WEBHOOK_URL = 'https://hook.eu1.make.com/pubylfgpgjpti5ibuhdpm4teafm24sr6';
const MIN_MEMO_CHARS = 12;
const MIN_MEMO_WORDS = 2;
// ──────────────────────────────────────────────────────────────────────────────

// State
let state = 'idle'; // idle | recording | reviewing | saving | done
let recognition = null;
let timerInt = null;
let seconds = 0;
let wakeLock = null;
let finalText = '';
let interimText = '';

// ── INIT ──────────────────────────────────────────────────
function toggleTranscript() {
  const el = document.getElementById('transcriptCollapse');
  const btn = document.getElementById('transcriptToggleBtn');
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'Nochmal lesen ▾' : 'Schließen ▴';
}

function init() {
  setTimeout(() => {
    const opening = document.getElementById('appOpening');
    if (opening) opening.classList.add('hidden');
  }, 1550);

  // Date
  const now = new Date();
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  document.getElementById('dateChip').textContent =
    days[now.getDay()] + ', ' + now.getDate() + '. ' + months[now.getMonth()];

  updatePrompt();
  renderMemoStrip();
  retryPendingMemos();

  // Reader now opens as internal app view.

  // Word count listener
  document.getElementById('reviewText').addEventListener('input', updateWordCount);
}

function updatePrompt() {
  const prompts = [
    'Was beschäftigt dich gerade?',
    'Was geht dir durch den Kopf?',
    'Was war heute wichtig?',
    'Ein Gedanke genügt.'
  ];
  const now = new Date();
  const idx = (now.getDate() + now.getHours()) % prompts.length;
  setPrompt(prompts[idx]);
}

// ── SCREENS ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });
  const target = document.getElementById('screen-' + id);
  // Small delay for exit transition
  setTimeout(() => target.classList.add('active'), 50);
}

// ── MEMO STRIP ────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `dm_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function todayCount() { return parseInt(localStorage.getItem(todayKey()) || '0'); }
function bumpCount()  { localStorage.setItem(todayKey(), todayCount() + 1); }

function renderMemoStrip() {
  const n = todayCount();
  const pips = document.getElementById('memoPips');
  const label = document.getElementById('memoLabel');
  pips.innerHTML = '';
  const show = Math.max(n + 1, 3);
  for (let i = 0; i < Math.min(show, 6); i++) {
    const d = document.createElement('div');
    d.className = 'pip' + (i < n ? ' on' : '');
    pips.appendChild(d);
  }
  label.textContent = n === 0 ? 'Noch kein Eintrag heute'
    : n === 1 ? '1 Eintrag heute'
    : n + ' Einträge heute';
}

// ── MIC BUTTON ────────────────────────────────────────────
function handleMicTap() {
  if (state === 'idle')      startRecording();
  else if (state === 'recording') stopRecording();
}

async function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Spracherkennung nicht verfügbar auf diesem Browser', true); return; }

  // Wake lock
  if (navigator.wakeLock) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }

  finalText = ''; interimText = '';

  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    interimText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interimText += e.results[i][0].transcript;
    }
    const pill = document.getElementById('livePill');
    const display = (finalText + interimText).slice(-90);
    pill.textContent = display + (interimText ? ' …' : '');
  };

  recognition.onerror = e => {
    if (e.error === 'aborted' || e.error === 'no-speech') {
      toast('Keine Sprache erkannt – bitte erneut versuchen.', true);
      return;
    }
    toast('Fehler: ' + e.error, true);
  };
  recognition.onend = () => { if (state === 'recording') recognition.start(); };
  recognition.start();

  // UI
  state = 'recording';
  seconds = 0;
  document.getElementById('micBtn').classList.add('rec');
  document.getElementById('ringWrap').classList.add('recording');
  document.getElementById('ambient').classList.add('active');
  document.getElementById('timer').classList.add('visible');
  document.getElementById('livePill').classList.add('visible');
  document.getElementById('hint').textContent = 'Tippe zum Beenden';
  setPrompt('Ich höre zu…');

  timerInt = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60), s = seconds % 60;
    document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }, 1000);
}

function stopRecording() {
  state = 'reviewing';

  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  clearInterval(timerInt);
  if (wakeLock) { wakeLock.release(); wakeLock = null; }

  // Reset idle UI
  document.getElementById('micBtn').classList.remove('rec');
  document.getElementById('ringWrap').classList.remove('recording');
  document.getElementById('ambient').classList.remove('active');
  document.getElementById('timer').classList.remove('visible');
  document.getElementById('livePill').classList.remove('visible');
  document.getElementById('livePill').textContent = '';

  const validation = validateMemoText(finalText + interimText);

  if (!validation.ok) {
    toast(validation.reason, true);
    state = 'idle';
    document.getElementById('hint').textContent = 'Zum Aufnehmen tippen';
    updatePrompt();
    return;
  }

  // Show review screen
  const ta = document.getElementById('reviewText');
  ta.value = validation.text;
  // Duration
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('durationDisplay').textContent = m+':'+(s<10?'0':'')+s+' gesprochen';
  // Time
  const now = new Date();
  document.getElementById('reviewSubtitle').textContent = 'Gerade eben · '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' Uhr';
  showScreen('review');
}


// ── TRANSCRIPT VALIDATION ───────────────────────────────────
function normalizeTranscript(text) {
  return String(text || '')
    .replace(/\s+/g, ' ')
    .replace(/[\u200B-\u200D\uFEFF]/g, '')
    .trim();
}

function getWordCount(text) {
  return normalizeTranscript(text).split(/\s+/).filter(Boolean).length;
}

function validateMemoText(text) {
  const normalized = normalizeTranscript(text);
  const words = getWordCount(normalized);
  const letters = (normalized.match(/[A-Za-zÀ-ÖØ-öø-ÿÄÖÜäöüß]/g) || []).length;

  if (!normalized) {
    return { ok: false, text: normalized, reason: 'Kein Text erkannt – bitte nochmals versuchen' };
  }
  if (normalized.length < MIN_MEMO_CHARS || words < MIN_MEMO_WORDS || letters < 6) {
    return { ok: false, text: normalized, reason: 'Aufnahme zu kurz oder leer – bitte nochmals versuchen' };
  }
  if (/^(undefined|null|nan|test)$/i.test(normalized)) {
    return { ok: false, text: normalized, reason: 'Ungültiger Text – bitte nochmals versuchen' };
  }

  return { ok: true, text: normalized, words, chars: normalized.length };
}

function archiveMemoLocally(payload) {
  try {
    const key = 'dm_local_archive';
    const archive = JSON.parse(localStorage.getItem(key) || '[]');
    archive.push({ ...payload, archivedAt: new Date().toISOString() });
    localStorage.setItem(key, JSON.stringify(archive.slice(-50)));
  } catch(e) {
    console.warn('Local archive failed:', e);
  }
}

// ── REVIEW ACTIONS ────────────────────────────────────────
function updateWordCount() {
  const el = document.getElementById('wordCount');
  if (!el) return;
  const words = getWordCount(document.getElementById('reviewText').value);
  el.textContent = words + (words === 1 ? ' Wort' : ' Wörter');
}

function confirmSave() {
  const validation = validateMemoText(document.getElementById('reviewText').value);
  if (!validation.ok) { toast(validation.reason, true); return; }
  document.getElementById('reviewText').value = validation.text;
  showScreen('saving');
  uploadToMake(validation.text);
}

function reRecord() {
  state = 'idle';
  document.getElementById('hint').textContent = 'Zum Aufnehmen tippen';
  updatePrompt();
  showScreen('idle');
}

// ── MEMO UPLOAD VIA MAKE → GITHUB ──────────────────────────────────────────────
function pad2(x) { return String(x).padStart(2, '0'); }

function buildMemoMeta() {
  const n = new Date();
  const date = `${n.getFullYear()}-${pad2(n.getMonth()+1)}-${pad2(n.getDate())}`;
  const time = `${pad2(n.getHours())}_${pad2(n.getMinutes())}`;
  return {
    date,
    time,
    filename: `daily memo_${date} ${time}.txt`
  };
}

function getPendingMemos() {
  try { return JSON.parse(localStorage.getItem('dm_pending_memos') || '[]'); }
  catch(e) { return []; }
}

function setPendingMemos(items) {
  localStorage.setItem('dm_pending_memos', JSON.stringify(items));
}

function queuePendingMemo(payload) {
  const items = getPendingMemos();
  items.push({ ...payload, queuedAt: new Date().toISOString() });
  setPendingMemos(items);
}

async function postMemoPayload(payload) {
  const validation = validateMemoText(payload && payload.content);
  if (!validation.ok) throw new Error('Invalid memo: ' + validation.reason);

  const cleanPayload = {
    ...payload,
    content: validation.text,
    validationStatus: 'valid',
    transcriptChars: validation.chars,
    transcriptWords: validation.words
  };

  const res = await fetch(MAKE_WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cleanPayload)
  });
  if (!res.ok) throw new Error('Webhook returned ' + res.status);
  return res;
}

async function uploadToMake(text) {
  const meta = buildMemoMeta();
  const validation = validateMemoText(text);
  if (!validation.ok) {
    toast(validation.reason, true);
    state = 'reviewing';
    showScreen('review');
    return;
  }

  const payload = {
    ...meta,
    content: validation.text,
    durationSeconds: seconds,
    source: 'daily-mind-pwa',
    version: COMBINED_APP_VERSION
  };

  archiveMemoLocally(payload);

  try {
    await postMemoPayload(payload);
    bumpCount();
    renderMemoStrip();
    state = 'done';
    showScreen('done');
    setTimeout(() => {
      state = 'idle';
      document.getElementById('hint').textContent = 'Zum Aufnehmen tippen';
      updatePrompt();
      showScreen('idle');
    }, 3200);
  } catch(e) {
    console.error('Make webhook error:', e);
    queuePendingMemo(payload);
    toast('Keine Verbindung – Gedanke lokal gesichert', true);
    state = 'reviewing';
    showScreen('review');
  }
}

async function retryPendingMemos() {
  const items = getPendingMemos();
  if (!items.length) return;
  const remaining = [];
  for (const item of items) {
    try { await postMemoPayload(item); }
    catch(e) { remaining.push(item); }
  }
  setPendingMemos(remaining);
  if (items.length && !remaining.length) toast('Nicht gesendete Gedanken wurden übertragen');
}

function decodeReaderHtml() {
  const binary = atob(READER_HTML_B64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function localISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { year: d.getUTCFullYear(), week: weekNo };
}

function openReader(search = '') {
  const overlay = document.getElementById('readerOverlay');
  const frame = document.getElementById('readerFrame');
  if (!overlay || !frame) return;

  const gedankeStyle = `<style>

  flex-direction: column !important;
  align-items: center !important;
  margin: 40px 0 56px !important;
  padding: 0 !important;
}

.dm-dot {

  flex-shrink: 0;
}
.dm-dot--green  { background-color: #7A9471; }
.dm-dot--yellow { background-color: #C4943A; }
.dm-dot--red    { background-color: #B55830; }
</style>
<script>
(function() {
  function styleGedanke() {
    var el = document.getElementById('textHeute');
    if (!el) return;
    if (document.body && document.body.classList.contains('weekly-mode')) {
      el.style.cssText = '';
      return;
    }
    var props = [
      ['font-family', "'Cormorant Garamond', serif"],
      ['font-style',  'italic'],
      ['font-size',   '28px'],
      ['font-weight', '500'],
      ['line-height', '1.88'],
      ['letter-spacing', '0.01em'],
      ['color',       '#261B10'],
      ['text-align',  'center'],
      ['max-width',   '82%'],
      ['margin',      '0 auto'],
      ['display',     'block'],
      ['white-space', 'pre-wrap']
    ];
    props.forEach(function(p) { el.style.setProperty(p[0], p[1], 'important'); });
  }

  function fixEmojiDots() {
    function walk(node) {
      if (node.nodeType === 3) {
        var text = node.nodeValue;
        if (/[\u{1F7E2}\u{1F7E1}\u{1F534}]/u.test(text)) {
          var span = document.createElement('span');
          span.innerHTML = text
            .replace(/🟢/g, '<span class="dm-dot dm-dot--green"></span>')
            .replace(/🟡/g, '<span class="dm-dot dm-dot--yellow"></span>')
            .replace(/🔴/g, '<span class="dm-dot dm-dot--red"></span>');
          if (node.parentNode) node.parentNode.replaceChild(span, node);
        }
      } else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
        Array.from(node.childNodes).forEach(walk);
      }
    }
    walk(document.body);
  }

  function fixStateQuotes() {
    document.querySelectorAll('*').forEach(function(el) {
      if (el.children.length === 0) {
        var t = el.textContent || '';
        if (t.charAt(0) === '"' && t.length < 50) {
          el.textContent = t.slice(1);
        }
      }
    });
  }

  function applyFixes() {
    fixEmojiDots();
    fixStateQuotes();
  }

  function init() {
    styleGedanke();
    applyFixes();
    var el = document.getElementById('textHeute');
    if (!el) return;
    new MutationObserver(function() {
      styleGedanke();
      applyFixes();
    }).observe(el, { childList: true, subtree: true, characterData: true });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  setTimeout(function() { styleGedanke(); applyFixes(); }, 800);
  setTimeout(function() { styleGedanke(); applyFixes(); }, 2500);
})();
<\/script>`;

  let html = decodeReaderHtml();
  html = html.replace('</head>', `<script>window.__DM_READER_SEARCH = ${JSON.stringify(search)};<\/script>${gedankeStyle}</head>`);
  frame.srcdoc = html;
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('reader-open');
}

function closeReader() {
  const overlay = document.getElementById('readerOverlay');
  const frame = document.getElementById('readerFrame');
  if (!overlay || !frame) return;
  overlay.classList.remove('active');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('reader-open');
  setTimeout(() => { frame.srcdoc = ''; }, 350);
}

var DM_WORKER = 'https://daily-mind-api.matthias-kessner.workers.dev';

function openTagebuch() {
  var overlay = document.getElementById('tagebuchOverlay');
  var content = document.getElementById('tagebuchContent');
  if (!overlay || !content) return;
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('reader-open');
  content.innerHTML = '<div class="tagebuch-state">Wird geladen ...</div>';

  fetch(DM_WORKER + '/julia/tagebuch?count=7', { cache: 'no-store' })
    .then(function(res) {
      if (!res.ok) throw new Error('Worker ' + res.status);
      return res.json();
    })
    .then(function(data) {
      if (!data.entries || !data.entries.length) {
        content.innerHTML = '<div class="tagebuch-state">Noch keine Tagebucheintraege vorhanden.</div>';
        return;
      }
      var html = '<div class="tb-page-header"><div class="tb-page-logo">Daily Mind</div><div class="tb-page-logo-sub">Dein Ort f&uuml;r Gedanken</div><div class="tb-page-rule"></div><div class="tb-section-label">Tagebuch</div></div>';
      for (var j = 0; j < data.entries.length; j++) {
        html += renderTbEntry(data.entries[j], j === data.entries.length - 1);
      }
      content.innerHTML = html;
    })
    .catch(function(err) {
      content.innerHTML = '<div class="tagebuch-state">Laden fehlgeschlagen.</div>';
      console.error('Tagebuch:', err);
    });
}

function tbFormatDate(s) {
  try {
    var d = new Date(s + 'T12:00:00Z');
    var wd = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    var mo = ['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    return wd[d.getUTCDay()] + ', ' + d.getUTCDate() + '. ' + mo[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
  } catch(e) { return s; }
}

function renderTbEntry(e, isLast) {
  var dateHtml = e.date ? '<div class="tagebuch-date">' + tbFormatDate(e.date) + '</div>' : '';
  var t = e.diary_tags || e.tags || [];
  var tagsHtml = t.length ? '<div class="tagebuch-tags">' + t.join(' - ') + '</div>' : '';
  var paras = e.text.split(/\n\n+/);
  var bodyHtml = '';
  for (var i = 0; i < paras.length; i++) {
    var p = paras[i].trim();
    if (p) bodyHtml += '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }
  var divider = isLast ? '' : '<div class="tagebuch-divider"></div>';
  return '<div class="tagebuch-entry">' + dateHtml + tagsHtml + '<div class="tagebuch-text">' + bodyHtml + '</div></div>' + divider;
}

function closeTagebuch() {
  var overlay = document.getElementById('tagebuchOverlay');
  if (!overlay) return;
  overlay.classList.remove('active');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('reader-open');
}
window.closeTagebuch = closeTagebuch;

// ── HELPERS ───────────────────────────────────────────────
function setPrompt(text) {
  const el = document.getElementById('promptText');
  el.classList.add('fade');
  setTimeout(() => { el.textContent = text; el.classList.remove('fade'); }, 220);
}

function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' err' : '') + ' show';
  setTimeout(() => t.className = 'toast', 3500);
}


// DAILY MIND UX HOTFIXES v1.1.1
window.addEventListener('error', function(e) {
  try {
    if (String(e.message || '').toLowerCase().includes('aborted')) {
      toast('Keine Sprache erkannt – bitte erneut versuchen.', true);
      e.preventDefault();
    }
  } catch(err) {}
});

window.addEventListener('unhandledrejection', function(e) {
  try {
    const msg = String(e.reason || '').toLowerCase();
    if (msg.includes('aborted')) {
      toast('Keine Sprache erkannt – bitte erneut versuchen.', true);
      e.preventDefault();
    }
  } catch(err) {}
});


init();

</script>
